---
- name: Full system update
  hosts: debian
  become: yes

  tasks:
    - name: Update, upgrade and autoremove
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
      register: apt_update

    - name: Reboot if needed
      reboot:
        msg: "Sistema actualizado, reiniciando..."
      when: apt_update.changed