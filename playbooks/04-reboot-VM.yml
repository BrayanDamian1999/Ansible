---
- name: Reboot Linux VMs
  hosts: afected-vm
  become: yes
  gather_facts: no
  serial: 1  # Reboot one host at a time to avoid full outage

  tasks:
    - name: Reboot server
      reboot:
        msg: "Reboot initiated by Ansible"
        pre_reboot_delay: 5      # Wait time before reboot (seconds)
        post_reboot_delay: 10    # Wait time after reboot (seconds)
        reboot_timeout: 600      # Maximum time to wait for the host to come back
        test_command: whoami     # Command to verify the system is up